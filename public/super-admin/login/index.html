<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Login</title>
<link rel="icon" href="/favicon.png?v=3">
<link rel="shortcut icon" href="/favicon.png?v=3">
<link rel="apple-touch-icon" href="/favicon.png?v=3">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#0F172A;
font-family:sans-serif;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center">

<div class="bg-[#111827] p-10 rounded-2xl w-full max-w-md border border-gray-700">

<h1 class="text-2xl font-bold text-white mb-6 text-center">
HotelMenuPro Super Admin
</h1>

<form id="loginForm" class="space-y-5">

<div>
<label class="text-gray-300 text-sm">Email</label>
<input
type="email"
id="email"
required
class="w-full mt-1 p-3 rounded bg-[#0F172A] border border-gray-600 text-white"
>
</div>

<div>
<label class="text-gray-300 text-sm">Password</label>
<input
type="password"
id="password"
required
class="w-full mt-1 p-3 rounded bg-[#0F172A] border border-gray-600 text-white"
>
</div>

<button
type="submit"
class="w-full bg-orange-500 hover:bg-orange-600 text-white p-3 rounded font-semibold"
>
Login
</button>

<p id="error" class="text-red-400 text-sm hidden text-center"></p>

</form>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errBox = document.getElementById("error");

  errBox.classList.add("hidden");
  errBox.innerText = "";

  try {
    const res = await fetch("/api/super-admin/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      credentials: "include",
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok && data.success) {
  if (data.sessionId) {
    localStorage.setItem("superAdminSessionId", data.sessionId);
  }

  window.location.href = "/super-admin/dashboard";
  return;
}

    errBox.innerText = data.error || "Login failed";
    errBox.classList.remove("hidden");
  } catch (err) {
    console.error("Login error:", err);
    errBox.innerText = "Server error";
    errBox.classList.remove("hidden");
  }
});
</script>

</body>
</html>
